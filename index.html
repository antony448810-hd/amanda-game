<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Mi niña hermosa, Amanda ❤️</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    margin:0;
    padding:20px;
    color:white;
    overflow-x:hidden;
}

.caja{
    max-width:600px;
    margin:auto;
    background:rgba(255,255,255,0.15);
    padding:25px;
    border-radius:20px;
    backdrop-filter:blur(10px);
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    margin:10px;
    cursor:pointer;
    font-size:16px;
}

input{
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
    width:200px;
}

.correcto{
    background:#4CAF50;
    color:white;
}

#final{
    display:none;
}

.corazon{
    position:fixed;
    color:red;
    font-size:25px;
    animation:subir 4s linear infinite;
    pointer-events:none;
}

@keyframes subir{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="caja">

<h1>❤️ Responde para el premioo ❤️</h1>

<div id="pregunta">

<h2 id="textoPregunta">
¿Cuál es mi princesa favorita?
</h2>

<div id="opciones">
<button onclick="respuesta(0)">Amanda</button>
<button onclick="respuesta(1)">Elsa</button>
<button onclick="respuesta(2)">Rapunzel</button>
</div>

</div>

<div id="final">

<h1>❤️ Te amo linda ❤️</h1>

<p>
Que proo amol has completado todas las pruebas y desbloqueado tu premio ❤️
</p>

<a href="premio.jpg" download>
<button class="correcto">
🎁 Descargar Premio
</button>
</a>

</div>

</div>

<script>

const preguntas = [

{
texto:"¿Cuál es mi princesa favorita?",
opciones:["Amanda","Elsa","Rapunzel"],
correcta:0
},

{
texto:"¿Quién esta en mis pensamientos todos los días?",
opciones:["La escuela","Amanda","jugar basquet"],
correcta:0
},

{
texto:"¿Quién es la niña más especial para mí?",
opciones:["Amanda","Nadie","Un gato naranja"],
correcta:0
}

];

let fase = 0;

function respuesta(opcion){

if(opcion === preguntas[fase].correcta){

fase++;

if(fase < preguntas.length){

document.getElementById("textoPregunta").innerHTML =
preguntas[fase].texto;

const botones =
document.querySelectorAll("#opciones button");

for(let i=0;i<3;i++){

botones[i].innerHTML =
preguntas[fase].opciones[i];

botones[i].onclick = () => respuesta(i);

}

}else{

document.getElementById("pregunta").innerHTML = `

<h2>🔐 Última prueba 🔐</h2>

<p>
Introduce el código secreto para desbloquear el premio.
</p>

<input
id="codigo"
type="password"
placeholder="Código secreto">

<br><br>

<button onclick="verificarCodigo()">
Verificar
</button>

`;

}

}else{

alert("Ups ❤️ intenta otra vez.");

}

}

function verificarCodigo(){

const codigo =
document.getElementById("codigo").value;

if(codigo === "1002"){

document.getElementById("pregunta").style.display="none";
document.getElementById("final").style.display="block";

}else{

alert("Código incorrecto ❤️");

}

}

setInterval(()=>{

const corazon =
document.createElement("div");

corazon.classList.add("corazon");

corazon.innerHTML = "❤️";

corazon.style.left =
Math.random()*100 + "vw";

document.body.appendChild(corazon);

setTimeout(()=>{
corazon.remove();
},4000);

},500);

</script>

</body>
</html>
