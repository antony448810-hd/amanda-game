<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Amanda ❤️</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    margin:0;
    padding:20px;
    color:white;
}

.caja{
    max-width:600px;
    margin:auto;
    background:rgba(255,255,255,0.15);
    padding:25px;
    border-radius:20px;
    backdrop-filter: blur(10px);
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    margin:10px;
    cursor:pointer;
    font-size:16px;
}

.correcto{
    background:#4CAF50;
    color:white;
}

.incorrecto{
    background:#f44336;
    color:white;
}

#final{
    display:none;
}

.corazon{
    position:fixed;
    color:red;
    font-size:25px;
    animation:subir 4s linear infinite;
}

@keyframes subir{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="caja">

<h1>❤️ Juego para Amanda ❤️</h1>

<div id="pregunta">

<h2>¿Cuál es mi princesa favorita?</h2>

<button onclick="correcta()">Amanda</button>
<button onclick="incorrecta()">Elsa</button>
<button onclick="incorrecta()">Rapunzel</button>

</div>

<div id="final">

<h1>🎉 ¡Ganaste! 🎉</h1>

<p>
Si llegaste aquí significa que eres la niña más especial del mundo para mí ❤️
</p>

<a href="premio.jpg" download>
<button class="correcto">
Descargar Sorpresa ❤️
</button>
</a>

</div>

</div>

<script>

function correcta(){
    document.getElementById("pregunta").style.display="none";
    document.getElementById("final").style.display="block";
}

function incorrecta(){
    alert("Ups, intenta otra vez ❤️");
}

setInterval(()=>{
    const corazon=document.createElement("div");
    corazon.classList.add("corazon");
    corazon.innerHTML="❤️";
    corazon.style.left=Math.random()*100+"vw";

    document.body.appendChild(corazon);

    setTimeout(()=>{
        corazon.remove();
    },4000);

},500);

</script>

</body>
</html>
